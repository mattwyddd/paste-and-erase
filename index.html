<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- 1. To change the description of your website, edit the 'content' below: -->
    <meta name="description" content="Paste & Erase - A personal infinite canvas for your ideas" />
    
    <!-- 2. To change the title of the website (seen on the browser tab), edit the text below: -->
    <title>Paste & Erase</title>
    
    <!-- 3. To change the mini icon (favicon) on the browser tab, place your icon file in the public folder and link it here: -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Text Logo -->
    <div class="text-logo">abc's portfolio</div>

    <!-- Live Clock -->
    <div class="live-clock" id="live-clock"></div>

    <!-- Top Navigation -->
    <nav class="glass-nav liquid-glass">
      <div class="nav-links" id="nav-links">
        <div class="nav-slider" id="nav-slider"></div>
        <button id="nav-canvas" class="nav-btn active">Ideas Gallery</button>
        <button id="nav-eraser" class="nav-btn">Background Eraser</button>
      </div>
    </nav>

    <!-- Main Views -->
    <main id="app-content">
      <!-- Views will be injected here by main.js -->
    </main>

    <!-- Global Progress / Loading overlay -->
    <div id="global-loader" class="hidden">
      <div class="loader-spinner"></div>
      <p id="loader-text">Loading...</p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
